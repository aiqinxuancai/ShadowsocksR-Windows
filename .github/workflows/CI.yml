name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  ProjectName: ShadowsocksR
  DOTNET_VERSION: 10.0.x
  NET_TFM: net10.0-windows
  Configuration: Release

jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      SyncfusionLicenseKey: ${{ secrets.SyncfusionLicenseKey }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
        cache-dependency-path: |
          **/*.csproj

    - name: Setup NuGet Private Sources
      shell: pwsh
      run: dotnet nuget add source https://nuget.pkg.github.com/HMBSbige/index.json -n GitHub-HMBSbige -u HMBSbige -p ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

    - name: Restore
      shell: pwsh
      run: dotnet restore .\shadowsocks-csharp.sln

    - name: Build publish outputs
      shell: pwsh
      run: .\build.ps1 all

    - name: Run tests
      shell: pwsh
      run: dotnet test .\UnitTest\UnitTest.csproj -c $env:Configuration -f $env:NET_TFM --no-restore --filter "FullyQualifiedName!~UnitTest.DnsTest"

    - name: Upload workflow artifacts
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ProjectName }}-publish-${{ github.sha }}
        path: |
          shadowsocks-csharp\bin\${{ env.Configuration }}\${{ env.NET_TFM }}\publish\
          shadowsocks-csharp\bin\${{ env.Configuration }}\${{ env.NET_TFM }}\win-x64\publish\
          shadowsocks-csharp\bin\${{ env.Configuration }}\${{ env.NET_TFM }}\win-x86\publish\

    - name: Package release artifacts
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $dist = Join-Path $env:RUNNER_TEMP "release-assets"
        $stagingRoot = Join-Path $env:RUNNER_TEMP "release-staging"
        $packages = @(
          @{ Name = "$env:ProjectName-$tag.zip"; Source = ".\shadowsocks-csharp\bin\$env:Configuration\$env:NET_TFM\publish\"; Root = $env:ProjectName },
          @{ Name = "$env:ProjectName-Win64-$tag.zip"; Source = ".\shadowsocks-csharp\bin\$env:Configuration\$env:NET_TFM\win-x64\publish\"; Root = $env:ProjectName },
          @{ Name = "$env:ProjectName-Win32-$tag.zip"; Source = ".\shadowsocks-csharp\bin\$env:Configuration\$env:NET_TFM\win-x86\publish\"; Root = $env:ProjectName }
        )

        New-Item -ItemType Directory -Path $dist -Force | Out-Null
        Remove-Item $stagingRoot -Recurse -Force -ErrorAction Ignore
        New-Item -ItemType Directory -Path $stagingRoot -Force | Out-Null
        $checksums = [System.Collections.Generic.List[string]]::new()

        foreach ($package in $packages) {
          $archivePath = Join-Path $dist $package.Name
          $stagePath = Join-Path $stagingRoot ([IO.Path]::GetFileNameWithoutExtension($package.Name))
          $payloadPath = Join-Path $stagePath $package.Root

          New-Item -ItemType Directory -Path $payloadPath -Force | Out-Null
          Copy-Item -Path (Join-Path $package.Source '*') -Destination $payloadPath -Recurse -Force

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path $payloadPath -DestinationPath $archivePath -CompressionLevel Optimal

          $hash = (Get-FileHash $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksums.Add("$hash *$($package.Name)")
        }

        $checksums | Set-Content -Path (Join-Path $dist 'SHA256SUMS.txt')

    - name: Upload release assets
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@v4
      with:
        name: release-assets
        path: ${{ runner.temp }}\release-assets\*

  release:
    name: Release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download release assets
      uses: actions/download-artifact@v4
      with:
        name: release-assets
        path: release-assets

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ github.ref_name }}
        prerelease: true
        draft: false
        files: release-assets/*
        body: |
          [![](https://img.shields.io/badge/Channel-blue?label=Telegram&logo=telegram)](https://t.me/ShadowsocksR_Windows) [![](https://img.shields.io/badge/Group-green?label=Telegram&logo=telegram)](https://t.me/joinchat/Gn-Aa0-j4HcpdBaW-Iv8Sw)

          ## Changelog
          * This release was built by GitHub Actions. Detailed notes can be added later.

          ## Checksums
          `SHA256SUMS.txt` is uploaded as a release asset.
